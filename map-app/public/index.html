<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>F1 Taxi — Ku doni të shkoni?</title>
  <link rel="stylesheet" href="map.css">
  <link rel="preconnect" href="https://maps.googleapis.com">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="map.js" defer></script>
</head>
<body>
  <!-- Full-screen map canvas -->
  <div id="map" aria-label="Hartë interaktive"></div>

  <!-- Dark vignette so the glass UI reads over any map area -->
  <div class="scrim" aria-hidden="true"></div>

  <!-- Floating glass search -->
  <div class="search" id="search">
    <div class="search__brand">
      <span class="search__f">F</span><span class="search__1">1</span>&nbsp;TAXI
    </div>

    <div class="search__box">
      <svg class="search__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      <input id="q" type="text" autocomplete="off" placeholder="Where would you like to go?"
             aria-label="Where would you like to go?">
      <button id="locate" class="search__locate" title="Use my location" aria-label="Use my location">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M22 12h-3M5 12H2"/></svg>
      </button>
    </div>

    <ul class="suggest" id="suggest" hidden></ul>
    <p class="search__hint" id="hint"></p>
  </div>

  <!-- Maps JS API — key injected by the backend, referrer-restricted -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=%%MAPS_BROWSER_KEY%%&callback=initMap&loading=async&v=weekly"
    async defer></script>
</body>
</html>
